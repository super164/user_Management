<!DOCTYPE html>
<html lang="en">

<head>
 <meta charset="UTF-8">
 <meta name="viewport" content="width=device-width, initial-scale=1.0">
 <title>后台登录</title>
 <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 flex items-center justify-center min-h-screen">
 <div class="bg-white p-8 rounded-lg shadow-lg w-full max-w-md">
  <h1 class="text-2xl font-bold text-center text-gray-800 mb-6">后台登录</h1>
  <form id="loginForm" onsubmit="submitLogin(event)">
   <!-- 用户名输入 -->
   <div class="mb-4">
    <label for="username" class="block text-sm font-medium text-gray-700">用户名</label>
    <input type="text" id="username" name="username" placeholder="请输入用户名"
     class="mt-1 block w-full px-4 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
     required />
   </div>

   <!-- 密码输入 -->
   <div class="mb-6">
    <label for="password" class="block text-sm font-medium text-gray-700">密码</label>
    <input type="password" id="password" name="password" placeholder="请输入密码"
     class="mt-1 block w-full px-4 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
     required />
   </div>

   <!-- 登录按钮 -->
   <button type="submit"
    class="w-full bg-blue-600 text-white py-2 px-4 rounded-md hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2">
    登录
   </button>

   <!-- 忘记密码链接 -->
   <div class="mt-4 text-center flex justify-between">
    <a href="#" onclick="alert('请联系管理员进行密码修改')" class="text-sm text-blue-600 hover:text-blue-500">忘记密码？</a>
    <a href="/register" class="text-sm text-blue-600 hover:text-blue-500">没有账号？注册</a>
   </div>

  </form>
 </div>

 <script src="/static/js/login.js"></script>
</body>

</html>
